<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />

    <!-- Fallback title / description (overridden per-page by react-helmet-async) -->
    <title>ShopFlow — Shop Smarter, Live Better</title>
    <meta name="description" content="Discover curated products across electronics, fashion, home, and sport — each picked for quality and delivered fast." />

    <!-- Open Graph fallbacks -->
    <meta property="og:site_name" content="ShopFlow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ShopFlow — Shop Smarter, Live Better" />
    <meta property="og:description" content="Curated products across electronics, fashion, home, and sport — delivered fast." />

    <!-- Twitter fallbacks -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@shopflow" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
